<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DOM Example</title>
  <meta name="description" content="An example for CSCI 3172">
  <meta name="author" content="Gabriella Mosquera">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/styles.css">
  <!--[if lt IE 9]>
	  <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
  <![endif]-->
</head>
<body>
 <div id="wrapper">
  <header>
	  <h1><a href="#"><img src="images/Dal_Logo.png" alt="Dalhousie University Logo"></a></h1>
	  <nav>
		<ul>
			<li><a href="#">Home</a></li>
			<li><a href="#">Privacy</a></li>
			<li><a href="#">Login</a></li>
		</ul>	  
	  </nav>
  </header>
  <section id="col_2">
    <h2>Sign Up</h2>
	<p>It's free and always will be.</p>
    <form action="#" method="post">
		<p>
			<input type="text" placeholder="First Name" name="first_name" id="firstName">				
			<input type="text" placeholder="Last Name" name="last_name" id="lastName">
		</p>
		<p> Please enter two numbers to perform a calculation: </p>
		<p>
			<input type="text" placeholder="Enter first number" name="number1" id="number1">
			<input type="text" placeholder="Enter second number" name="number2" id="number2">
		</p>
		<p>
			<button type="button" onclick="performCalculation('add')">Add</button>
			<button type="button" onclick="performCalculation('subtract')">Subtract</button>
			<button type="button" onclick="performCalculation('multiply')">Multiply</button>
			<button type="button" onclick="performCalculation('divide')">Divide</button>
		</p>
		<p id="result"></p>

		<hr>
		<h3>Array Operations</h3>
		<p>Enter numbers separated by commas (e.g., 3, 64, 23, 11):</p>
		<p>
			<input type="text" placeholder="e.g., 1, 2, 3, 4" name="numberArray" id="numberArray">
		</p>
		<button type="button" onclick="checkArrayEvenOdd()">Check Array</button>
		<p id="arrayResult"></p>  	
	</form>
  	<hr>
  	<p class="create"><strong><a href="#">Create a Page</a> for a celebrity, band or business.</strong></p>
  </section>
 </div>
 <script src="js/script.js"></script>
</body>
</html>
